services:
  postgres:
    image: postgres:16-alpine
    container_name: ujk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ujk_dev
      POSTGRES_USER: ujk_user
      POSTGRES_PASSWORD: ujk_dev_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ujk_user -d ujk_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ujk-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
